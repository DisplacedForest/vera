name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  verify:
    name: verify tag matches VERSION
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Tag must equal root VERSION
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version="$(cat VERSION)"
          if [ "$tag" != "$version" ]; then
            echo "tag v$tag does not match VERSION ($version)" >&2
            exit 1
          fi
      - name: Leak gate
        env:
          VERA_OWNER_NAME: ${{ secrets.VERA_OWNER_NAME }}
          HOME_LOCATION_NAME: ${{ secrets.HOME_LOCATION_NAME }}
          WEATHER_LAT: ${{ secrets.WEATHER_LAT }}
          WEATHER_LON: ${{ secrets.WEATHER_LON }}
        run: sh scripts/leak-gate.sh

  app:
    name: build Vera.app.zip
    needs: verify
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - name: Use the newest installed Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          swift --version
      - name: Package
        working-directory: apps/vera-mac
        run: scripts/package.sh
      - name: Smoke-test the packaged binary
        working-directory: apps/vera-mac
        run: |
          if [ "$(sw_vers -productVersion | cut -d. -f1)" -ge 26 ]; then
            build/Vera.app/Contents/MacOS/Vera --selftest
          else
            echo "runner macOS $(sw_vers -productVersion) is below the app's macOS 26 floor; the build is the check here and the selftest runs on deployments"
          fi
      - name: Zip
        working-directory: apps/vera-mac/build
        run: ditto -c -k --keepParent Vera.app Vera.app.zip
      - uses: actions/upload-artifact@v4
        with:
          name: Vera.app.zip
          path: apps/vera-mac/build/Vera.app.zip
          if-no-files-found: error

  image:
    name: push GHCR image
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Bake VERSION into the build context
        run: cp VERSION services/vera-api/VERSION
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Lowercase owner
        id: owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: services/vera-api
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner }}/vera-api:${{ github.ref_name }}
            ghcr.io/${{ steps.owner.outputs.owner }}/vera-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  engine:
    name: build vera-api-macos-arm64.zip
    needs: verify
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: services/vera-api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
      - name: Build
        working-directory: services/vera-api
        run: pyinstaller --noconfirm vera-api.spec
      - name: Smoke-boot the packaged engine
        working-directory: services/vera-api
        run: |
          export VERA_DATA_DIR="$RUNNER_TEMP/vera-data"
          ./dist/vera-api/vera-api &
          engine_pid=$!
          for i in $(seq 1 30); do
            sleep 1
            if curl -sf http://127.0.0.1:8089/version > /tmp/version.json; then
              break
            fi
          done
          cat /tmp/version.json
          tag="${GITHUB_REF_NAME#v}"
          grep -q "\"$tag\"" /tmp/version.json
          curl -sf http://127.0.0.1:8089/pulse/veins/catalog > /tmp/catalog.json
          python3 -c "import json; d = json.load(open('/tmp/catalog.json')); assert d['veins'] == [], d['veins']"
          kill "$engine_pid"
      - name: Zip and checksum
        working-directory: services/vera-api/dist
        run: |
          ditto -c -k --keepParent vera-api vera-api-macos-arm64.zip
          shasum -a 256 vera-api-macos-arm64.zip > vera-api-macos-arm64.zip.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: vera-api-macos-arm64
          path: |
            services/vera-api/dist/vera-api-macos-arm64.zip
            services/vera-api/dist/vera-api-macos-arm64.zip.sha256
          if-no-files-found: error

  release:
    name: create GitHub Release
    needs: [app, image, engine]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Vera.app.zip
      - uses: actions/download-artifact@v4
        with:
          name: vera-api-macos-arm64
      - uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          generate_release_notes: true
          files: |
            Vera.app.zip
            vera-api-macos-arm64.zip
            vera-api-macos-arm64.zip.sha256
