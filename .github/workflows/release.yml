name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  verify:
    name: verify tag matches VERSION
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Tag must equal root VERSION
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version="$(cat VERSION)"
          if [ "$tag" != "$version" ]; then
            echo "tag v$tag does not match VERSION ($version)" >&2
            exit 1
          fi

  app:
    name: build Vera.app.zip
    needs: verify
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Use the newest installed Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          swift --version
      - name: Package
        working-directory: apps/vera-mac
        run: scripts/package.sh
      - name: Zip
        working-directory: apps/vera-mac/build
        run: ditto -c -k --keepParent Vera.app Vera.app.zip
      - uses: actions/upload-artifact@v4
        with:
          name: Vera.app.zip
          path: apps/vera-mac/build/Vera.app.zip
          if-no-files-found: error

  image:
    name: push GHCR image
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bake VERSION into the build context
        run: cp VERSION services/vera-api/VERSION
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Lowercase owner
        id: owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: services/vera-api
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner }}/vera-api:${{ github.ref_name }}
            ghcr.io/${{ steps.owner.outputs.owner }}/vera-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: create GitHub Release
    needs: [app, image]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Vera.app.zip
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: Vera.app.zip
